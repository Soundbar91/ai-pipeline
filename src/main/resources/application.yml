spring:
  application:
    name: ai-pipeline

  datasource:
    url: jdbc:mysql://localhost:3306/ai_pipeline?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jackson:
    serialization:
      write-dates-as-timestamps: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:your-very-long-secret-key-at-least-256-bits-for-hs256-algorithm}
  access-token-expiration: 1800
  refresh-token-expiration: 2592000
  signup-token-expiration: 3600

social:
  google:
    user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
  kakao:
    user-info-uri: https://kapi.kakao.com/v2/user/me
  naver:
    user-info-uri: https://openapi.naver.com/v1/nid/me

logging:
  level:
    io.github.soundbar91.aipipeline: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
