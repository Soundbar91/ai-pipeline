name: "🔧 작업"
description: 리팩토링, 문서화, 환경 설정 등 일반 작업을 등록합니다.
title: "[Task] "
labels: ["chore"]
body:
  - type: markdown
    attributes:
      value: |
        작업 등록 시 아래 양식을 작성해 주세요.

  - type: dropdown
    id: type
    attributes:
      label: 작업 유형
      description: 작업의 성격을 선택해 주세요.
      options:
        - "refactor (리팩토링)"
        - "docs (문서화)"
        - "style (코드 스타일)"
        - "build (빌드/의존성)"
        - "chore (기타)"
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: 작업 요약
      description: 진행할 작업을 간략히 설명해 주세요.
      placeholder: 어떤 작업인지 한두 문장으로 요약해 주세요.
    validations:
      required: true

  - type: textarea
    id: detail
    attributes:
      label: 상세 작업 내용
      description: 구체적으로 무엇을 해야 하는지 작성해 주세요.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: 작업 이유
      description: 이 작업이 필요한 이유를 작성해 주세요.
    validations:
      required: false

  - type: textarea
    id: etc
    attributes:
      label: 기타 사항
      description: 참고할 자료나 추가 정보를 작성해 주세요.
    validations:
      required: false